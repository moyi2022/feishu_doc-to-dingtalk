<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飞书 → 钉钉文档迁移</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>飞书 <span>→</span> 钉钉 文档迁移</h1>
      <p class="subtitle">快速迁移飞书文档到钉钉知识库</p>
    </header>

    <!-- 配置区域 -->
    <section class="card">
      <h2>API 配置</h2>
      <div class="config-grid">
        <!-- 飞书配置 -->
        <div class="config-column">
          <h3>飞书</h3>
          <div class="form-group">
            <label>App ID</label>
            <input type="text" id="feishu-app-id" placeholder="cli_xxxxxxxxx">
          </div>
          <div class="form-group">
            <label>App Secret</label>
            <input type="password" id="feishu-app-secret" placeholder="应用密钥">
          </div>
          <div class="hint-box">
            <strong>所需权限</strong>
            <ul>
              <li>查看新版文档</li>
              <li>查看知识库</li>
              <li>下载云文档中的图片和附件</li>
            </ul>
          </div>
          <button class="btn btn-primary" onclick="testFeishuAuth()">保存配置</button>
        </div>

        <!-- 钉钉配置 -->
        <div class="config-column">
          <h3>钉钉</h3>
          <div class="form-group">
            <label>Client ID</label>
            <input type="text" id="dingtalk-client-id" placeholder="dingxxxxxxxx">
          </div>
          <div class="form-group">
            <label>Client Secret</label>
            <input type="password" id="dingtalk-client-secret" placeholder="应用密钥">
          </div>
          <div class="form-group">
            <label>Corp ID</label>
            <input type="text" id="dingtalk-corp-id" placeholder="企业ID">
          </div>
          <div class="form-group">
            <label>操作用户 unionId</label>
            <input type="text" id="dingtalk-user-id" placeholder="必填">
            <span class="hint">创建文档需要 unionId，不是 userId</span>
          </div>

          <!-- unionId 获取工具 -->
          <div class="unionid-tool">
            <div class="tool-header" onclick="toggleUnionIdTool()">
              <span>获取 unionId</span>
              <span id="unionid-toggle-icon">▼</span>
            </div>
            <div id="unionid-tool-content" class="tool-content" style="display:none;">
              <div class="permission-notice">
                <strong>所需权限</strong>
                <ul>
                  <li>Contact.User.Read</li>
                  <li>qyapi_get_member_by_mobile</li>
                </ul>
              </div>
              <div class="form-group">
                <label>查询方式</label>
                <select id="unionid-search-type">
                  <option value="userid">通过 userId</option>
                  <option value="mobile">通过手机号</option>
                </select>
              </div>
              <div class="form-group">
                <label>查询值</label>
                <input type="text" id="unionid-search-value" placeholder="输入 userId 或手机号">
              </div>
              <button class="btn btn-secondary" onclick="getUnionId()">查询</button>
              <div id="unionid-result" class="result-box" style="display:none;"></div>
            </div>
          </div>

          <div class="hint-box">
            <strong>所需权限</strong>
            <ul>
              <li>知识库文档写权限</li>
              <li>企业存储文件写权限</li>
            </ul>
          </div>
          <button class="btn btn-primary" onclick="testDingtalkAuth()">保存配置</button>
        </div>
      </div>
    </section>

    <!-- 迁移区域 -->
    <section class="card">
      <h2>开始迁移</h2>

      <div class="tabs">
        <button class="tab-btn active" onclick="showTab('single')">单个文档</button>
        <button class="tab-btn" onclick="showTab('batch')">批量迁移</button>
      </div>

      <!-- 单个文档 -->
      <div id="single-tab" class="tab-content active">
        <div class="form-group">
          <label>飞书文档 URL</label>
          <input type="url" id="feishu-doc-url" placeholder="https://xxx.feishu.cn/docx/xxxxx">
        </div>

        <div class="form-group">
          <label>目标钉钉知识库</label>
          <div style="display:flex; gap:8px; align-items:center; margin-bottom:4px;">
            <label style="display:flex; align-items:center; gap:4px; cursor:pointer; font-size:0.8125rem;">
              <input type="radio" name="workspace-input-mode-single" value="select" checked onchange="toggleWorkspaceInputMode('single')">
              <span>下拉选择</span>
            </label>
            <label style="display:flex; align-items:center; gap:4px; cursor:pointer; font-size:0.8125rem;">
              <input type="radio" name="workspace-input-mode-single" value="manual" onchange="toggleWorkspaceInputMode('single')">
              <span>手动输入</span>
            </label>
          </div>
          <div id="workspace-select-wrapper-single" style="display:flex; gap:8px;">
            <select id="dingtalk-workspace-id-single" style="flex:1;">
              <option value="">请先配置钉钉凭证</option>
            </select>
            <button class="btn btn-secondary" onclick="loadDingtalkWorkspaces('dingtalk-workspace-id-single')" title="刷新">↻</button>
          </div>
          <div id="workspace-input-wrapper-single" style="display:none;">
            <input type="text" id="dingtalk-workspace-id-single-manual" placeholder="输入知识库 ID">
          </div>
        </div>

        <details style="margin:12px 0;">
          <summary style="cursor:pointer; font-size:0.8125rem; color:var(--text-secondary); margin-bottom:10px;">高级选项</summary>
          <div class="form-group">
            <label>父节点 ID（文件夹）</label>
            <input type="text" id="dingtalk-parent-node-id" placeholder="留空则在根目录创建">
          </div>
          <div class="form-group">
            <label>模板 ID</label>
            <input type="text" id="dingtalk-template-id" placeholder="可选">
          </div>
          <div class="form-group">
            <label>模板类型</label>
            <select id="dingtalk-template-type">
              <option value="">不使用模板</option>
              <option value="official_template">官方模板</option>
              <option value="team_template">团队模板</option>
              <option value="user_template">个人模板</option>
            </select>
          </div>
        </details>

        <button class="btn btn-success btn-large" onclick="migrateSingle()">开始迁移</button>
      </div>

      <!-- 批量迁移 -->
      <div id="batch-tab" class="tab-content">
        <div class="form-group">
          <label>飞书知识库 ID</label>
          <input type="text" id="feishu-wiki-id" placeholder="从飞书知识库URL获取">
          <span class="hint">URL 中 wiki/ 后面的部分</span>
        </div>

        <div class="form-group">
          <label>目标钉钉知识库</label>
          <div style="display:flex; gap:8px; align-items:center; margin-bottom:4px;">
            <label style="display:flex; align-items:center; gap:4px; cursor:pointer; font-size:0.8125rem;">
              <input type="radio" name="workspace-input-mode-batch" value="select" checked onchange="toggleWorkspaceInputMode('batch')">
              <span>下拉选择</span>
            </label>
            <label style="display:flex; align-items:center; gap:4px; cursor:pointer; font-size:0.8125rem;">
              <input type="radio" name="workspace-input-mode-batch" value="manual" onchange="toggleWorkspaceInputMode('batch')">
              <span>手动输入</span>
            </label>
          </div>
          <div id="workspace-select-wrapper-batch" style="display:flex; gap:8px;">
            <select id="dingtalk-workspace-id-batch" style="flex:1;">
              <option value="">请先配置钉钉凭证</option>
            </select>
            <button class="btn btn-secondary" onclick="loadDingtalkWorkspaces('dingtalk-workspace-id-batch')" title="刷新">↻</button>
          </div>
          <div id="workspace-input-wrapper-batch" style="display:none;">
            <input type="text" id="dingtalk-workspace-id-batch-manual" placeholder="输入知识库 ID">
          </div>
        </div>

        <div class="form-group">
          <label>最大迁移深度</label>
          <select id="max-depth">
            <option value="1">仅一级文档</option>
            <option value="3" selected>三级以内</option>
            <option value="99">所有文档</option>
          </select>
        </div>

        <button class="btn btn-success btn-large" onclick="migrateBatch()">开始批量迁移</button>
      </div>
    </section>

    <!-- 进度区域 -->
    <section id="progress-section" class="card" style="display:none;">
      <h2>迁移进度</h2>
      <div class="progress-info">
        <span id="progress-text">准备中...</span>
        <span id="progress-percent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-details">
        <span>成功 <strong id="success-count">0</strong></span>
        <span>失败 <strong id="failed-count">0</strong></span>
        <span>总计 <strong id="total-count">0</strong></span>
      </div>
    </section>

    <!-- 结果区域 -->
    <section id="results-section" class="card" style="display:none;">
      <h2>迁移结果</h2>
      <div id="results-content"></div>
    </section>

    <footer>
      <p>本地执行 · 数据安全</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
